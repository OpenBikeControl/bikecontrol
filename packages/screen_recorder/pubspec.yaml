name: screen_recorder
description: "In-repo screen recording plugin for BikeControl (iOS/macOS/Windows capture)."
version: 0.0.1
publish_to: none

environment:
  sdk: '>=3.8.1 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  # Native platform implementations (macos/windows/ios) are added in the
  # follow-up native tasks; until then this is a Dart-only MethodChannel
  # wrapper and `screen_recorder` calls throw MissingPluginException (caught
  # by NativeChannelScreenRecorder → reported as "not supported"). Declaring
  # platforms here without native code breaks macOS/Windows plugin registrants.
  plugin:
    platforms: {}
