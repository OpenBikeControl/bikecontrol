name: screen_recorder
description: "In-repo screen recording plugin for BikeControl (iOS/macOS/Windows capture)."
version: 0.0.1
publish_to: none

environment:
  sdk: '>=3.8.1 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      macos:
        pluginClass: ScreenRecorderPlugin
      windows:
        pluginClass: ScreenRecorderPlugin
